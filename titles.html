<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>探索犬の称号</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f6f7f9;
  padding:20px;
}

.back-btn{
  margin-bottom:16px;
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  font-size:14px;
  font-weight:700;
}

h1{
  font-size:20px;
  margin-bottom:20px;
}

.title{
  background:#fff;
  border-radius:12px;
  padding:14px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  font-weight:700;
}
  .current-level{
  text-align:center;
  font-weight:700;
  margin:14px 0 20px;
  padding:10px;
  background:#f3f4f6;
  border-radius:12px;
  font-size:16px;
}
</style>
</head>

<body>

<button class="back-btn" onclick="history.back()">← 戻る</button>
<div class="current-level">
現在の探索レベル  
<span id="currentLevel">Lv0 野良犬</span>
</div>
<h1>🏆 探索犬の称号</h1>

<div class="title">Lv0 野良犬（0）</div>
<div class="title">Lv1 ルーキー探索犬（1）</div>
<div class="title">Lv2 見習い探索犬（10）</div>
<div class="title">Lv3 ベテラン探索犬（30）</div>
<div class="title">Lv4 補給所ハンター（60）</div>
<div class="title">Lv5 エース探索犬（100）</div>
<div class="title">Lv6 補給所マスター（200）</div>
<div class="title">Lv7 松山制覇（500）</div>
<div class="title">Lv8 ？？？</div>
<div class="title">Lv9 ？？？</div>
<script>

function getLevel(found){

  if(found >= 1500) return "Lv9 チーター";
  if(found >= 1000) return "Lv8 暫定神";
  if(found >= 500) return "Lv7 松山制覇";
  if(found >= 200) return "Lv6 補給所マスター";
  if(found >= 100) return "Lv5 エース探索犬";
  if(found >= 60) return "Lv4 補給所ハンター";
  if(found >= 30) return "Lv3 ベテラン探索犬";
  if(found >= 10) return "Lv2 見習い探索犬";
  if(found >= 1) return "Lv1 ルーキー探索犬";

  return "Lv0 野良犬";
}

const foundCount = parseInt(localStorage.getItem("wanwan_found_count") || 0);

const level = getLevel(foundCount);

document.getElementById("currentLevel").textContent = level;

</script>
</body>
</html>
