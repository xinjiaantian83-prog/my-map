<script>
    
    
            var map_6cc0193127fc3b4198a53bf53b85c8ac = L.map(
                "map_6cc0193127fc3b4198a53bf53b85c8ac",
                {
                    center: [33.7602936, 132.703782],
                    crs: L.CRS.EPSG3857,
                    ...{
  "zoom": 15,
  "zoomControl": true,
  "preferCanvas": false,
}

                }
            );
fetch('raw_coords.txt?v=' + Date.now())
  .then(r => r.text())
  .then(text => {
    const lines = text.trim().split('\n');



var customIcon = L.icon({
  iconUrl: "gold_coin.png",
  iconSize: [40, 40],
  iconAnchor: [20, 40]
});

    lines.forEach(line => {
      const [lat, lng] = line.split(',').map(Number);
      L.marker([lat, lng], { icon: customIcon })
        .addTo(map_6cc0193127fc3b4198a53bf53b85c8ac);
    });
  });
  
            

        
    
            var tile_layer_411b0d25b098c9862e67aa9383e9cb53 = L.tileLayer(
                "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
                {
  "minZoom": 0,
  "maxZoom": 19,
  "maxNativeZoom": 19,
  "noWrap": false,
  "attribution": "\u0026copy; \u003ca href=\"https://www.openstreetmap.org/copyright\"\u003eOpenStreetMap\u003c/a\u003e contributors",
  "subdomains": "abc",
  "detectRetina": false,
  "tms": false,
  "opacity": 1,
}

            );
        
    
            tile_layer_411b0d25b098c9862e67aa9383e9cb53.addTo(map_6cc0193127fc3b4198a53bf53b85c8ac);
        
    
            
        ;

        
 function showDogMessage() {
  const messages = [
    "こまめな水分補給を。ワン。",
    "喉が渇く前に一口だワン。",
    "無理せず休憩も大事だワン。",
    "今日も安全第一だワン。",
    "特にないワン。"
  ];

  const msgBox = document.getElementById("dogMessage");
  const randomIndex = Math.floor(Math.random() * messages.length);

  msgBox.textContent = messages[randomIndex];
  msgBox.style.opacity = "1";

  setTimeout(() => {
    msgBox.style.opacity = "0";
  }, 2500);
}

window.addEventListener("load", showDogMessage);   
</script>
<div id="dogMessage"></div>
