<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>座標整形ツール</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:16px;line-height:1.5}
    textarea{width:100%;min-height:180px;font-size:16px}
    button{font-size:16px;padding:10px 14px;margin:8px 8px 0 0}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    .hint{color:#555;font-size:14px}
  </style>
</head>
<body>
  <h1>座標整形（(lat, lng) → lat,lng）</h1>

  <p class="hint">例: <code>(33.7864888, 132.7245295)</code> を貼ると <code>33.7864888,132.7245295</code> になります。複数行OK。</p>

  <h3>入力（生）</h3>
  <textarea id="in" placeholder="(33.7864888, 132.7245295)
(33.7590825, 132.7036603)"></textarea>

  <div class="row">
    <button id="convert">変換</button>
    <button id="copy">出力をコピー</button>
    <button id="clear">クリア</button>
  </div> 
  <div style="margin:10px 0;">
  <strong>勢力を選択：</strong><br>
  <label><input type="radio" name="type" value="shiba" checked> しば犬</label>
  <label><input type="radio" name="type" value="bull"> ブル</label>
  <label><input type="radio" name="type" value="pome"> ポメ</label>
</div>

  <h3>出力（raw_coords.txt に貼る用）</h3>
  <textarea id="out" readonly></textarea>

  <script>
    const $in = document.getElementById('in');
    const $out = document.getElementById('out');

    function normalize(text) {
      // 1) 改行で分割
      const lines = text.split(/\r?\n/);

      // 2) 各行から「緯度・経度」を抽出（カッコあり/なし、カンマ+空白など全部許容）
      const coords = [];
      for (const line of lines) {
        const s = line.trim();
        if (!s) continue;

        // 数値(±,小数) を2個拾う
        const nums = s.match(/[+-]?\d+(?:\.\d+)?/g);
        if (!nums || nums.length < 2) continue;

        const lat = nums[0];
        const lng = nums[1];
        // 選択中のtype取得
const selectedType = document.querySelector('input[name="type"]:checked')?.value || "shiba";

// 元行にすでに3列目があればそれを優先
let type = selectedType;
const rawParts = s.split(",").map(x => x.trim());
if (rawParts.length >= 3 && rawParts[2]) {
  type = rawParts[2];
}

coords.push(`${lat},${lng},${type}`);
      }
      return coords.join('\n');
    }

    document.getElementById('convert').onclick = () => {
      $out.value = normalize($in.value);
    };

    document.getElementById('copy').onclick = async () => {
      if (!$out.value) $out.value = normalize($in.value);
      await navigator.clipboard.writeText($out.value);
      alert('コピーしました（raw_coords.txt に貼れます）');
    };

    document.getElementById('clear').onclick = () => {
      $in.value = '';
      $out.value = '';
      $in.focus();
    };
  </script>
</body>
</html>
