<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>座標整形ツール</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:16px;line-height:1.5}
    textarea{width:100%;min-height:180px;font-size:16px}
    button{font-size:16px;padding:10px 14px;margin:8px 8px 0 0}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    .hint{color:#555;font-size:14px}
  </style>
</head>
<body>
  <h1>座標整形（(lat, lng) → lat,lng）</h1>

  <p class="hint">例: <code>(33.7864888, 132.7245295)</code> を貼ると <code>33.7864888,132.7245295</code> になります。複数行OK。</p>

  <h3>入力（生）</h3>
  <textarea id="in" placeholder="(33.7864888, 132.7245295)
(33.7590825, 132.7036603)"></textarea>

  <div class="row">
    <button id="convert">変換</button>
    <button id="copy">出力をコピー</button>
    <button id="clear">クリア</button>
    <div id="status" style="margin:8px 0; font-size:14px; opacity:0.75;"></div>
  </div> 
  <div style="margin:10px 0;">
  <strong>勢力を選択：</strong><br>
  <label><input type="radio" name="type" value="shiba" checked> しば犬</label>
  <label><input type="radio" name="type" value="bull"> ブル</label>
  <label><input type="radio" name="type" value="pome"> ポメ</label>
</div>

  <h3>出力（raw_coords.txt に貼る用）</h3>
  <textarea id="out" readonly></textarea>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const Sin = document.getElementById('in');
  const Sout = document.getElementById('out');
  const status = document.getElementById('status');

  function setStatus(msg) {
    if (!status) return;
    status.textContent = msg;
    status.style.opacity = 1;
    clearTimeout(setStatus._t);
    setStatus._t = setTimeout(() => (status.style.opacity = 0.75), 2000);
  }

  function normalize(text) {
    const lines = text.split(/\r?\n/);
    const coords = [];

    for (const line of lines) {
      const s = line.trim();
      if (!s) continue;

      const nums = s.match(/[-+]?\d+(?:\.\d+)?/g);
      if (!nums || nums.length < 2) continue;

      const lat = nums[0];
      const lng = nums[1];
      coords.push(`${lat},${lng}`);
    }

    return coords.join('\n');
  }

  function ensureOutput() {
    const v = (Sin?.value ?? '').trim();
    Sout.value = normalize(v);
    return Sout.value;
  }

  document.getElementById('convert')?.addEventListener('click', () => {
    ensureOutput();
    setStatus('変換したぞ✅');
  });

  document.getElementById('copy')?.addEventListener('click', async () => {
    try {
      const text = ensureOutput();
      if (!text.trim()) {
        setStatus('コピーする内容が空だぞ⚠️');
        return;
      }

      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
        setStatus('raw_coords.txt 用データをコピーしたぞ🔥');
        return;
      }

      Sout.focus();
      Sout.select();
      const ok = document.execCommand('copy');
      setStatus(ok ? 'raw_coords.txt 用データをコピーしたぞ🔥（互換）' : 'コピー失敗');
    } catch {
      setStatus('コピー失敗：手動でコピーしてくれ');
    }
  });

  document.getElementById('clear')?.addEventListener('click', () => {
    Sin.value = '';
    Sout.value = '';
    Sin.focus();
    setStatus('クリアしたぞ🧹');
  });

  setStatus('準備OK😎');
});
</script>
  

</body>
</html>
