<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わんわんコインマップ</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="わんコイン">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body { margin: 0; padding: 0; height: 100%; }
#map { height: 100vh; width: 100%; }

/* 距離切替UI */
#controls {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 1000;
  background: rgba(255,255,255,0.95);
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 10px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  font-size: 14px;
  min-width: 210px;
}
#controls .row { display: flex; gap: 6px; flex-wrap: wrap; }
#controls button {
  border: 1px solid #ccc;
  background: #fff;
  border-radius: 10px;
  padding: 8px 10px;
}
#controls button.active {
  border-color: #000;
  font-weight: 700;
}
#status {
  margin-top: 6px;
  font-size: 12px;
  opacity: 0.88;
  line-height: 1.3;
}
</style>
</head>

<body>
<div id="controls">
  <div class="row">
    <button data-radius="500" class="active">500m</button>
    <button data-radius="1000">1km</button>
    <button data-radius="3000">3km</button>
    <button data-radius="all">全部</button>
  </div>
  <div id="status">現在地を取得中…（許可してね）</div>
</div>

<div id="map"></div>

<script>
// ---- データ（重複除去済み）----
var spots = [
  [33.7726943,132.7420953],
  [33.7787246,132.7334036],
  [33.7860538,132.7700416],
  [33.8034033,132.8846008],
  [33.7910892,132.8316751],
  [33.8046770,132.7797834],
  [33.7711199,132.7880211],
  [33.7599650,132.7889663],
  [33.7390628,132.7932565],
  [33.7351421,132.7927763],
  [33.7421107,132.7921276],
  [33.7444029,132.7923673],
  [33.8094331,132.6991143],
  [33.8089272,132.7013201],
  [33.8117082,132.8199307],
  [33.8105922,132.7298708],
  [33.8156763,132.7345231],
  [33.7912987,132.7206806],
  [33.8300203,132.7251123],
  [33.8215540,132.7643684],
  [33.8080507,132.8060831],
  [33.8156011,132.7316444],
  [33.8156332,132.7256038],
  [33.8156070,132.7217994],
  [33.8155504,132.7190531],
  [33.8145504,132.7039929],
  [33.8016963,132.7655087],
  [33.7970574,132.7550900],
  [33.7894327,132.7383597],
  [33.7849564,132.7142030],
  [33.7535562,132.7061742],
  [33.7505099,132.6987807],
  [33.7483915,132.6984045],
  [33.7496150,132.6974225],
  [33.7577386,132.6999608],
  [33.7667983,132.7041464],
  [33.7667957,132.7024747],
  [33.7794684,132.7044167],
  [33.7818928,132.7089291],
  [33.7828119,132.7091038],
  [33.7875802,132.7023024],
  [33.7942018,132.7017844],
  [33.8027441,132.7315294],
  [33.8027296,132.7295476],
  [33.7974196,132.7247317],
  [33.7934830,132.7277824],
  [33.8220002,132.7275799],
  [33.8200535,132.7242814]
];

// ---- 地図 ----
var map = L.map('map').setView([33.7864888, 132.7245295], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// 柴犬ピン
var dogIcon = L.icon({
  iconUrl: 'IMG_7139.PNG',
  iconSize: [40, 40],
  iconAnchor: [20, 40]
});

// マーカー管理
var markers = [];
function clearMarkers() {
  markers.forEach(function(m){ map.removeLayer(m); });
  markers = [];
}

// 「ここへ行く」リンク生成（Googleマップ）
function googleNavUrl(lat, lng) {
  return "https://www.google.com/maps/dir/?api=1&destination=" + lat + "," + lng;
}

function addMarkers(list) {
  list.forEach(function(coord){
    var lat = coord[0], lng = coord[1];
    var m = L.marker([lat, lng], { icon: dogIcon }).addTo(map);

    var nav = googleNavUrl(lat, lng);
    m.bindPopup(
      "<b>自販機スポット</b><br>" +
      "<a href='" + nav + "' target='_blank'>ここへ行く</a>"
    );

    markers.push(m);
  });
}

// 距離計算（メートル）: haversine
function distanceMeters(lat1, lon1, lat2, lon2) {
  var R = 6371000;
  var toRad = function(d){ return d * Math.PI / 180; };
  var dLat = toRad(lat2 - lat1);
  var dLon = toRad(lon2 - lon1);
  var a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
    Math.sin(dLon/2) * Math.sin(dLon/2);
  var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// ---- 現在地表示（ピン + 精度円）----
var currentPos = null;
var myMarker = null;
var accuracyCircle = null;

function updateMyLocation(lat, lng, accuracyMeters) {
  currentPos = { lat: lat, lng: lng };

  if (!myMarker) {
    myMarker = L.marker([lat, lng]).addTo(map).bindPopup("あなたの現在地");
  } else {
    myMarker.setLatLng([lat, lng]);
  }

  if (!accuracyCircle) {
    accuracyCircle = L.circle([lat, lng], {
      radius: Math.max(accuracyMeters || 0, 10),
      weight: 1,
      fillOpacity: 0.12
    }).addTo(map);
  } else {
    accuracyCircle.setLatLng([lat, lng]);
    accuracyCircle.setRadius(Math.max(accuracyMeters || 0, 10));
  }
}

// ---- 半径円（フィルタ範囲）----
var currentRadius = 500; // default
var rangeCircle = null;

function updateRangeCircle() {
  if (!currentPos) return;

  if (currentRadius === 'all') {
    if (rangeCircle) {
      map.removeLayer(rangeCircle);
      rangeCircle = null;
    }
    return;
  }

  var lat = currentPos.lat, lng = currentPos.lng;
  if (!rangeCircle) {
    rangeCircle = L.circle([lat, lng], {
      radius: currentRadius,
      weight: 1,
      fillOpacity: 0.08
    }).addTo(map);
  } else {
    rangeCircle.setLatLng([lat, lng]);
    rangeCircle.setRadius(currentRadius);
  }
}

// ---- 表示更新 ----
function refresh() {
  clearMarkers();

  // 現在地が取れてない間は全部表示（迷わない）
  if (!currentPos) {
    addMarkers(spots);
    document.getElementById('status').textContent = "現在地未取得：全件表示中（位置情報を許可してね）";
    return;
  }

  updateRangeCircle();

  if (currentRadius === 'all') {
    addMarkers(spots);
    document.getElementById('status').textContent = "全件表示中";
    return;
  }

  var lat = currentPos.lat, lng = currentPos.lng;
  var filtered = spots.filter(function(c){
    return distanceMeters(lat, lng, c[0], c[1]) <= currentRadius;
  });

  addMarkers(filtered);

  var rText = (currentRadius >= 1000) ? (currentRadius/1000 + "km") : (currentRadius + "m");

  if (filtered.length === 0) {
    document.getElementById('status').textContent =
      "半径 " + rText + " にありません。\n距離を広げてみてね。";
  } else {
    document.getElementById('status').textContent =
      "半径 " + rText + "： " + filtered.length + "件";
  }
}

// ---- 位置情報（watchPosition）----
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(function(pos){
    var lat = pos.coords.latitude;
    var lng = pos.coords.longitude;
    var acc = pos.coords.accuracy;

    updateMyLocation(lat, lng, acc);

    if (!window.__didCenterOnce) {
      window.__didCenterOnce = true;
      map.setView([lat, lng], 15);
    }

    refresh();
  }, function(){
    refresh();
  }, { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 });
} else {
  refresh();
}

// ---- ボタン操作 ----
document.querySelectorAll('#controls button').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('#controls button').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');

    var v = btn.getAttribute('data-radius');
    currentRadius = (v === 'all') ? 'all' : parseInt(v, 10);

    refresh();
  });
});
</script>
</body>
</html>
