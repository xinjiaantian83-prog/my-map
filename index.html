<style>
html, body{
  margin:0;
  padding:0;
  font-family:sans-serif;
}

body{
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  padding:2px 6px;
  flex:0 0 auto;
  background:#ffffff;
  box-shadow:0 6px 18px rgba(0,0,0,0.18);
  border-radius:16px;
  margin:6px 6px 0;
}

h2{
  margin:0;
  line-height:1;
  font-size:18px;
}

/* タイトル */
.title-main{
  font-size:22px;
  font-weight:900;
  letter-spacing:-0.01em;
}

/* 発見数 */
#count{
  font-size:17px;
  font-weight:800;
}

button{
  padding:3px 7px;
  margin:2px 1px;
  font-size:10px;

  border-radius:18px;
  border:none;

  background:#f3f4f6;
  color:#333;

  font-weight:700;
  transition:all 0.15s ease;
  white-space:nowrap;
}

button.active{
  background:#2b7de9;
  color:#fff;

  box-shadow:
    0 2px 6px rgba(0,0,0,0.25),
    inset 0 1px 0 rgba(255,255,255,0.25);
}
  #btnRecord{
  margin-left:auto;
  width:56px;
  height:56px;
  border-radius:50%;
  padding:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:transparent;
}
  #btnRecord img{
  width:44px;
  height:44px;
  display:block;
  pointer-events:none;
    filter: drop-shadow(0 0 1px #000)
          drop-shadow(0 0 1px #000)
          drop-shadow(0 0 1px #000);
}
  #btnRecord:active{
  transform:scale(0.9);
}
  button:active{
  transform:scale(0.95);
}
  #btnRecord{
  position:relative;
}

.record-text{
  position:absolute;
  bottom:2px;
  left:50%;
  transform:translateX(-50%);
  font-size:11px;
  font-weight:bold;
  color:white;
  text-shadow:
    0 0 2px #000,
    0 0 2px #000,
    0 0 2px #000;
  pointer-events:none;
}
#map{
  flex:1 1 auto;
  min-height:0;
  width:100%;

  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}
/* ===== コインクラスタ（完全版）===== */

.coin-cluster{
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
}

.coin-cluster > div{
  width: 60px;
  height: 60px;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
}

.coin{
  position: relative;
  width: 60px;
  height: 60px;
  overflow: hidden;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #f5f5f5, #cfcfcf 70%, #9e9e9e);
  border: 2px solid #e8e8e8;
  box-shadow:
    inset 0 2px 3px rgba(255,255,255,0.8),
    inset 0 -2px 3px rgba(0,0,0,0.2),
    0 2px 4px rgba(0,0,0,0.25);
}

.coin img{
  position: absolute;
  width: 28px;
  height: 28px;
  left: 10px;
  top: 6px;
  object-fit: contain;
  opacity: 0.28;
  pointer-events: none;
}

.coin span{
  position: absolute;
  left: 0;
  right: 0;
  bottom: 3px;
  text-align: center;
  font-weight: 800;
  font-size: 14px;
  line-height: 1;
  color: #ffffff;
  text-shadow:
    0 1px 2px rgba(0,0,0,0.95),
    0 0 4px rgba(0,0,0,0.75);
  pointer-events: none;
}

.spot-card{
  position: relative;
  background: #fffdf8;
  border: 2px solid #d8c9ae;
  border-radius: 14px;
  padding: 14px 12px 12px;
  min-width: 180px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.18);
}

.card-close{
  position: absolute;
  top: 6px;
  right: 6px;
  border: none;
  background: transparent;
  padding: 0;
  margin: 0;
  line-height: 0;
}

.bone-close{
  width: 26px;
  height: 26px;
  cursor: pointer;
  display: block;
  opacity: 0.95;
  transition: transform 0.12s ease, opacity 0.12s ease;
}

.bone-close:hover{
  transform: scale(1.06);
  opacity: 1;
}

.leaflet-popup-content-wrapper{
  border-radius: 14px;
  padding: 0;
}

.leaflet-popup-content{
  margin: 0;
}

.spot-title{
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 10px;
  padding-right: 30px;
}

.spot-actions{
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.spot-btn{
  width: 100%;
  border: none;
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}

.spot-btn-go{
  background: #f3f7ff;
}

.spot-btn-record{
  background: #fff4d6;
}

.spot-note{
  margin-top: 8px;
  font-size: 12px;
  color: #666;
  line-height: 1.4;
}
  #discoverPopup{
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 18px 28px;
  border-radius: 14px;
  font-size: 20px;
  font-weight: bold;
  text-align:center;
  z-index: 9999;
  display: none;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}
  .paw-icon{
  font-size:18px;
  text-align:center;
  line-height:30px;
}
  
  .user-dot-wrap{
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.user-dot{
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background:#2a7fff;
  border: 2px solid #2a7fff;
  box-shadow: 0 0 0 4px rgba(42,127,255,0.18);
  animation: userPulse 1.6s infinite ease-out;
}

@keyframes userPulse{
  0%{
    transform: scale(0.95);
    box-shadow: 0 0 0 0 rgba(42,127,255,0.30);
  }
  70%{
    transform: scale(1);
    box-shadow: 0 0 0 10px rgba(42,127,255,0);
  }
  100%{
    transform: scale(0.95);
    box-shadow: 0 0 0 0 rgba(42,127,255,0);
  }
}
  .record-card{
  position:fixed;
  top:56px;
  left:50%;
  transform:translateX(-50%);
  width:min(92vw, 340px);
  background:#fff;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.18);
  z-index:3000;
  padding:14px 14px 12px;
}

.hidden{
  display:none;
}

.record-card-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}

.record-title{
  font-weight:800;
  font-size:16px;
}

.record-close{
  border:none;
  background:transparent;
  font-size:20px;
  font-weight:700;
  padding:0 4px;
  margin:0;
  line-height:1;
}

.record-section{
  padding:10px 0;
  border-top:1px solid #eee;
}

.record-section:first-of-type{
  border-top:none;
}

.record-label{
  font-size:12px;
  color:#666;
  margin-bottom:4px;
}

.record-value{
  font-size:16px;
  font-weight:700;
}
  .record-subtitle{
  font-size:13px;
  color:#666;
  margin-top:2px;
}
  .explorer-title{
  margin:8px 0 4px;
}

.explorer-stats{
  font-size:14px;
  line-height:1.6;
}

.stat-line{
  margin:2px 0;
}

.level-link{
  cursor:pointer;
  color:#333;
}
  .leaflet-top.leaflet-left{
  top:240px;
}
  .back-btn{
  margin-bottom:16px;
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  font-size:14px;
  font-weight:700;
}
  .discover-toast{
  position:fixed;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  font-weight:900;
  text-align:center;
  font-size:28px;
  color:#222;
  text-shadow:0 2px 6px rgba(0,0,0,0.3);
  pointer-events:none;
  z-index:99999;
}
.discover-toast.show{
  animation:discoverFloat 1.2s ease forwards;
}

@keyframes discoverPop{
  0%{transform:translate(-50%,-50%) scale(0.8);}
  60%{transform:translate(-50%,-50%) scale(1.15);}
  100%{transform:translate(-50%,-50%) scale(1);}
}
  @keyframes discoverFloat{
  0%{
    transform:translate(-50%,-50%);
    opacity:1;
  }
  100%{
    transform:translate(-50%,-90%);
    opacity:0;
  }
}

.hidden{
  display:none;
}
</style>
</head>

<script>
  const foundSound = new Audio("chieuk-coin-257878.mp3");
const ESTIMATED_TOTAL = 1500;
  function generateInternalUserId(){
  return "wwc_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}

function generateDefaultUserName(){
  const num = Math.floor(1000 + Math.random() * 9000);
  return "探索隊" + num;
}

const internalUserIdKey = "wanwan_internal_user_id";
const userNameKey = "wanwan_user_name";

let internalUserId = localStorage.getItem(internalUserIdKey);
if(!internalUserId){
  internalUserId = generateInternalUserId();
  localStorage.setItem(internalUserIdKey, internalUserId);
}

let userName = localStorage.getItem(userNameKey);
if(!userName){
  userName = generateDefaultUserName();
  localStorage.setItem(userNameKey, userName);
}

function setRangeActive(btn){
  document.querySelectorAll(".range-btn")
    .forEach(b => b.classList.remove("active"));

  btn.classList.add("active");
}
const map = L.map('map', {
  tapHold: true,
  tapTolerance: 15
}).setView([33.8392,132.7657],13);

const pawIcon = L.divIcon({
  html: "🐾",
  className: "paw-icon",
  iconSize: [30,30]
});
  let pawMarkers = [];
  let pawData = JSON.parse(localStorage.getItem("wanwan_paws") || "[]");

map.on('contextmenu', function(e){

  const newLatLng = L.latLng(e.latlng.lat, e.latlng.lng);
    // 現在地が必要
  if(!userLatLng){
    alert("先に現在地をONにしてください");
    return;
  }

  // 現在地から30m以内だけ報告OK
  if(userLatLng.distanceTo(newLatLng) > 30){
    alert("近くに行くと報告できます");
    return;
  }

// 🐾重複チェック
for(const p of pawMarkers){
  if(newLatLng.distanceTo(p.getLatLng()) < 30){
    alert("この近くに未確認補給所があります");
    return;
  }
}

// 本ピン近く禁止
for(const s of spotsRaw){
  if(newLatLng.distanceTo([s.lat, s.lng]) < 30){
    alert("この近くには既に補給所があります");
    return;
  }
}

// 最後に確認
if(!confirm("未確認補給所を報告する？")){
  return;
}

  const sponsor = getSponsorForSpot({
  lat: e.latlng.lat,
  lng: e.latlng.lng
});

const m = L.marker([e.latlng.lat, e.latlng.lng], {
  icon: pawIcon
}).addTo(map)
.bindPopup(`
  <div class="spot-card">
    <button class="card-close" onclick="closePopup()" aria-label="閉じる">
      <svg class="bone-close" viewBox="0 0 64 64" aria-hidden="true">
        <g transform="rotate(45 32 32)">
          <rect x="20" y="28" width="24" height="8" rx="4"
            fill="#f5f1e8"
            stroke="#7a6a58"
            stroke-width="3"/>
          <circle cx="18" cy="26" r="6"
            fill="#f5f1e8"
            stroke="#7a6a58"
            stroke-width="3"/>
          <circle cx="18" cy="38" r="6"
            fill="#f5f1e8"
            stroke="#7a6a58"
            stroke-width="3"/>
          <circle cx="46" cy="26" r="6"
            fill="#f5f1e8"
            stroke="#7a6a58"
            stroke-width="3"/>
          <circle cx="46" cy="38" r="6"
            fill="#f5f1e8"
            stroke="#7a6a58"
            stroke-width="3"/>
        </g>
        <g transform="rotate(-45 32 32)">
          <rect x="20" y="28" width="24" height="8" rx="4"
            fill="#f5f1e8"
            stroke="#7a6a58"
            stroke-width="3"/>
          <circle cx="18" cy="26" r="6"
            fill="#f5f1e8"
            stroke="#7a6a58"
            stroke-width="3"/>
          <circle cx="18" cy="38" r="6"
            fill="#f5f1e8"
            stroke="#7a6a58"
            stroke-width="3"/>
          <circle cx="46" cy="26" r="6"
            fill="#f5f1e8"
            stroke="#7a6a58"
            stroke-width="3"/>
          <circle cx="46" cy="38" r="6"
            fill="#f5f1e8"
            stroke="#7a6a58"
            stroke-width="3"/>
        </g>
      </svg>
    </button>

    <div class="spot-title">🐾 未確認補給所</div>

    <div class="spot-actions">
      <button class="spot-btn spot-btn-go" onclick="goNav(${e.latlng.lat},${e.latlng.lng})">調査に向かう</button>
    </div>

    <div class="spot-note">
      探索隊が報告<br>
      現在調査中
    </div>
    ${sponsor ? `
<div style="margin-top:8px;font-size:12px;color:#666;text-align:center;">
──────<br>
探索隊サポーター<br>
<a href="${sponsor.url}" target="_blank">${sponsor.name}</a>
</div>
` : ``}
  </div>
`)
.openPopup();

    pawMarkers.push(m);
    pawData.push({
  lat: e.latlng.lat,
  lng: e.latlng.lng
});

localStorage.setItem("wanwan_paws", JSON.stringify(pawData));


});
L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
{maxZoom:19}
).addTo(map);

let markers=[];
let sponsorsMap = {};

    return L.divIcon({

    });

map.addLayer(pomeCluster);

let userLatLng=null;
let userMarker=null;
let userCircle=null;

let currentRadius=null;

let watchId=null;
  let hasCentered = false;
  let popupOpen = false;

  
const shibaIcon=L.icon({

  iconAnchor:[15,36]

const bulldogIcon=L.icon({

const pomeDotIcon=L.icon({

function closePopup(){
  popupOpen = false;
  map.closePopup();
}

function goNav(lat,lng){
  const url = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
  location.href = url;
}

function updateCountText(){
  const found = spotsRaw.length;
  const percent = Math.round((found / ESTIMATED_TOTAL) * 100);
  const countEl = document.getElementById("count");
  if(countEl){
    countEl.textContent = `${found} / ${ESTIMATED_TOTAL}（推定） • ${percent}%`;
  }
}
function recordFind(lat,lng,type){

  if(!userLatLng){
    alert("先に現在地をONにしてください");
    return;
  }

  const d = userLatLng.distanceTo([lat,lng]);

  if(d > 30){
    alert("近くに行くと記録できます");
    return;
  }

  const k = keyOf({lat:lat,lng:lng,type:type});

  if(discovered.has(k)){
    alert("この自販機は記録済みです");
    return;
  }

  foundSound.currentTime = 0;
foundSound.play().catch(() => {});

  
  showDiscoverToast();

  if (navigator.vibrate) {
    navigator.vibrate(200);
  }

  discovered.add(k);
  localStorage.setItem(
  "wanwan_discovered",
  JSON.stringify([...discovered])
);
  

todayFound++;
localStorage.setItem(todayKey, todayFound);
localStorage.setItem(todayDateKey, getTodayString());

updateFoundUI();
  vibrateOnce();

function getTodayString(){
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2,"0");
  const d = String(now.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}

function loadTodayFound(){
  const today = getTodayString();
  const savedDate = localStorage.getItem(todayDateKey);

  if(savedDate !== today){
    localStorage.setItem(todayDateKey, today);
    localStorage.setItem(todayKey, "0");
    return 0;
  }

  return Number(localStorage.getItem(todayKey) || 0);
}

let todayFound = loadTodayFound();

  function getLevel(found){

  if(found === 0){
    return "Lv0 野良犬";
  }
  if(found <= 9){
    return "Lv1 ルーキー探索犬";
  }
  if(found <= 29){
    return "Lv2 見習い探索犬";
  }
  if(found <= 59){
    return "Lv3 ベテラン探索犬";
  }
  if(found <= 99){
    return "Lv4 補給所ハンター";
  }
  if(found <= 199){
    return "Lv5 エース探索犬";
  }
  if(found <= 499){
    return "Lv6 補給所マスター";
  }
  if(found <= 999){
    return "Lv7 松山制覇";
  }
  if(found <= 1499){
    return "Lv8 暫定神";
  }

  return "Lv9 チーター";
}

);
