<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わんわんコインマップ</title>

<!-- ホーム画面アプリ化（iPhone） -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="わんコイン">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<!-- アイコン -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">

<!-- PWA（Android/共通） -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body { margin: 0; padding: 0; }
#map { height: 100vh; width: 100%; }
</style>
</head>

<body>
<div id="map"></div>

<script>
var map = L.map('map').setView([33.7864888, 132.7245295], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var dogIcon = L.icon({
  iconUrl: 'IMG_7139.PNG',
  iconSize: [50, 50],
  iconAnchor: [25, 50],
  popupAnchor: [0, -50]
});

var vendingSpots = [
  { name: "80円自販機", lat: 33.7864888, lng: 132.7245295, minPrice: 80, maxPrice: 120 }
];

vendingSpots.forEach(function(spot) {
  var marker = L.marker([spot.lat, spot.lng], { icon: dogIcon }).addTo(map);

  var googleNav =
    "https://www.google.com/maps/dir/?api=1&destination=" +
    spot.lat + "," + spot.lng;

  marker.bindPopup(
    "<b>" + spot.name + "</b><br>" +
    "価格: " + spot.minPrice + "〜" + spot.maxPrice + "円<br><br>" +
    "<a href='" + googleNav + "' target='_blank'>ここへ行く</a>"
  );
});
</script>

</body>
</html>
