<script>

// ▼ 初期表示位置（好きに変えられる）
var map = L.map('map').setView([33.7864888, 132.7245295], 13);

// ▼ 地図タイル
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// ▼ 安価自販機データ
var vendingSpots = [
  {
    name: "80円自販機",
    lat: 33.7864888,
    lng: 132.7245295,
    minPrice: 80,
    maxPrice: 120
  }
];

// ▼ マーカー生成
vendingSpots.forEach(function(spot) {

  var marker = L.marker([spot.lat, spot.lng]).addTo(map);

  var googleNav =
    "https://www.google.com/maps/dir/?api=1&destination=" +
    spot.lat + "," + spot.lng;

  marker.bindPopup(
    "<b>" + spot.name + "</b><br>" +
    "価格: " + spot.minPrice + "〜" + spot.maxPrice + "円<br><br>" +
    "<a href='" + googleNav + "' target='_blank'>ここへ行く</a>"
  );

});

</script>
