<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>わんわんコインマップ</title>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<style>
html, body{
  margin:0;
  padding:0;
  font-family:sans-serif;
}

body{
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.controls{
  padding:4px 10px 2px;
  flex:0 0 auto;
}

h2{
  margin:2px 0 6px;
  font-size:20px;
  line-height:1.2;
}

#count{
  font-size:16px;
  font-weight:700;
}

button{
  padding:6px 10px;
  margin:2px;
  font-size:13px;
  border-radius:6px;
}

#map{
  flex:1 1 auto;
  min-height:0;
  width:100%;
}
  /* ===== コインクラスタ（完全版）===== */

.coin-cluster{
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
}

.coin-cluster > div{
  width: 60px;
  height: 60px;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
}

.coin{
  position: relative;
  width: 60px;
  height: 60px;
  overflow: hidden;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #f5f5f5, #cfcfcf 70%, #9e9e9e);
  border: 2px solid #e8e8e8;
  box-shadow:
    inset 0 2px 3px rgba(255,255,255,0.8),
    inset 0 -2px 3px rgba(0,0,0,0.2),
    0 2px 4px rgba(0,0,0,0.25);
}

.coin img{
  position: absolute;
  width: 28px;
  height: 28px;
  left: 10px;
  top: 6px;
  object-fit: contain;
  opacity: 0.28;
  pointer-events: none;
}

.coin span{
  position: absolute;
  left: 0;
  right: 0;
  bottom: 3px;
  text-align: center;
  font-weight: 800;
  font-size: 14px;
  line-height: 1;
  color: #ffffff;
  text-shadow:
    0 1px 2px rgba(0,0,0,0.95),
    0 0 4px rgba(0,0,0,0.75);
  pointer-events: none;
}
</style>



</head>

<body>

<div class="controls">

<h2>
🐕 わんわん探索隊<br>
推定総数 約1500台<br>
発見数 <span id="count"></span>
</h2>

<button id="btn500">500m</button>
<button id="btn1k">1km</button>
<button id="btn3k">3km</button>
<button id="btnAll">全部</button>
<button id="btnLocate">現在地</button>



</div>

<div id="map"></div>

<script>

const map = L.map('map').setView([33.8392,132.7657],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);

let spotsRaw=[];
let markers=[];

let shibaCluster = L.markerClusterGroup({
  maxClusterRadius: 35,
  disableClusteringAtZoom: 15,
  spiderfyOnMaxZoom: false,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
  removeOutsideVisibleBounds: true,
  chunkedLoading: true,
  iconCreateFunction: function(cluster) {

  const count = cluster.getChildCount();

  return L.divIcon({
    html: `
      <div class="coin">
        <img src="shiba.png">
        <span>${count}</span>
      </div>
    `,
    className: "coin-cluster",
    iconSize: L.point(60,60)
  });

}
});
let bulldogCluster = L.markerClusterGroup({
  maxClusterRadius: 35,
  disableClusteringAtZoom: 15,
  spiderfyOnMaxZoom: false,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
  removeOutsideVisibleBounds: true,
  chunkedLoading: true,
  iconCreateFunction: function(cluster) {

  const count = cluster.getChildCount();

  return L.divIcon({
    html: `
      <div class="coin">
        <img src="bulldog.png">
        <span>${count}</span>
      </div>
    `,
    className: "coin-cluster",
    iconSize: L.point(60,60)
  });

}
});
  let pomeCluster = L.markerClusterGroup({
  maxClusterRadius: 35,
  disableClusteringAtZoom: 15,
  spiderfyOnMaxZoom: false,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
  removeOutsideVisibleBounds: true,
  chunkedLoading: true,
  iconCreateFunction: function(cluster) {

    const count = cluster.getChildCount();

    return L.divIcon({
      html: `
        <div class="coin">
          <img src="pome.png">
          <span>${count}</span>
        </div>
      `,
      className: "coin-cluster",
      iconSize: L.point(60,60)
      });

  }
});
map.addLayer(shibaCluster);
map.addLayer(bulldogCluster);
map.addLayer(pomeCluster);

let userLatLng=null;
let userMarker=null;
let userCircle=null;

let currentRadius=null;

let watchId=null;
const shibaIcon=L.icon({
iconUrl:'shiba.png',
iconSize:[30,36],
iconAnchor:[15,36]
});

const bulldogIcon=L.icon({
iconUrl:'bulldog.png',
iconSize:[30,36],
iconAnchor:[15,36]
});

const pomeIcon=L.icon({
iconUrl:'pome.png',
iconSize:[30,36],
iconAnchor:[15,36]
});


function show(t){
  console.log(t);
}
function setRadiusCircle(m){

if(userCircle) map.removeLayer(userCircle);

userCircle=L.circle(userLatLng,{
radius:m
}).addTo(map);

}

function normalizeSpots(arr){

return arr.map(s=>({
lat:Number(s.lat),
lng:Number(s.lng),
type:s.type||"nky"
}));

}

function renderMarkers(){

markers.forEach(m=>map.removeLayer(m));
markers=[];

shibaCluster.clearLayers();
bulldogCluster.clearLayers();
pomeCluster.clearLayers();

let count=0;

spotsRaw.forEach(s=>{

if(currentRadius && userLatLng){

const d=userLatLng.distanceTo([s.lat,s.lng]);

if(d>currentRadius) return;

}

let icon=shibaIcon;

if(s.type==="bul") icon=bulldogIcon;
if(s.type==="pom") icon=pomeIcon;

const m=L.marker([s.lat,s.lng],{
icon:icon
});
m.on("click", () => {
  const url = `https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}`;
  location.href = url;
});

if(s.type==="bul"){
bulldogCluster.addLayer(m);
}
else if(s.type==="pom"){
pomeCluster.addLayer(m);
}
else{
shibaCluster.addLayer(m);
}

count++;

});

document.getElementById("count").textContent = spotsRaw.length + "台";

}



function updateUserMarker(lat,lng){

userLatLng=L.latLng(lat,lng);

if(userMarker) map.removeLayer(userMarker);

const pawIcon=L.icon({
iconUrl:'paw_pin.png',
iconSize:[36,44],
iconAnchor:[18,44]
});

userMarker=L.marker(userLatLng,{icon:pawIcon}).addTo(map);

map.setView(userLatLng,15);

}

const DISCOVER_RADIUS_M=15;
const discovered=new Set();
let lastVibeAt=0;

function keyOf(s){

return `${Number(s.lat).toFixed(6)},${Number(s.lng).toFixed(6)},${s.type}`;

}

function vibrateOnce(){

const now=Date.now();

if(now-lastVibeAt<8000) return;

lastVibeAt=now;

if(navigator.vibrate) navigator.vibrate([80]);

}

function checkDiscoveries(coords){

if(!userLatLng) return;

let hit=0;

for(const s of spotsRaw){

const k=keyOf(s);

if(discovered.has(k)) continue;

const d=userLatLng.distanceTo([s.lat,s.lng]);

if(d<=DISCOVER_RADIUS_M){

discovered.add(k);
hit++;

}

}

if(hit>0){

vibrateOnce();

show(`🐾 発見 +${hit}（合計 ${discovered.size}）`);

setTimeout(()=>{

renderMarkers();

},1500);

}

}

async function loadSpots(){

show("データ読み込み中...");

const res=await fetch("spots.json",{cache:"no-store"});

const data=await res.json();

spotsRaw=normalizeSpots(data);

renderMarkers();

}

document.getElementById("btnAll").addEventListener("click",()=>{

currentRadius=null;

if(userCircle){
map.removeLayer(userCircle);
userCircle=null;
}

renderMarkers();

});

document.getElementById("btn500").addEventListener("click",()=>{

currentRadius=500;

if(userLatLng) setRadiusCircle(500);

renderMarkers();

});

document.getElementById("btn1k").addEventListener("click",()=>{

currentRadius=1000;

if(userLatLng) setRadiusCircle(1000);

renderMarkers();

});

document.getElementById("btn3k").addEventListener("click",()=>{

currentRadius=3000;

if(userLatLng) setRadiusCircle(3000);

renderMarkers();

});

document.getElementById("btnLocate").addEventListener("click",()=>{

if(!navigator.geolocation){

show("位置情報が使えません");
return;

}

if(watchId!==null){

navigator.geolocation.clearWatch(watchId);
watchId=null;

show("現在地追跡OFF");

return;

}

show("現在地追跡ON");

watchId=navigator.geolocation.watchPosition(

(pos)=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

updateUserMarker(lat,lng);

if(currentRadius!=null) setRadiusCircle(currentRadius);

renderMarkers();

checkDiscoveries(pos.coords);

},

(err)=>{

show("現在地取得失敗");

},

{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
}

);

});

loadSpots();

setTimeout(() => {
  map.invalidateSize();
}, 300);

</script>

</body>
</html>
