<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>安価自販機マップ</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    #map {
      height: 100vh;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([33.7864888, 132.7245295], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var vendingSpots = [
  {
    name: "80円自販機",
    lat: 33.7864888,
    lng: 132.7245295,
    minPrice: 80,
    maxPrice: 120
  }
];

vendingSpots.forEach(function(spot) {

  var marker = L.marker([spot.lat, spot.lng]).addTo(map);

  var googleNav =
    "https://www.google.com/maps/dir/?api=1&destination=" +
    spot.lat + "," + spot.lng;

  marker.bindPopup(
    "<b>" + spot.name + "</b><br>" +
    "価格: " + spot.minPrice + "〜" + spot.maxPrice + "円<br><br>" +
    "<a href='" + googleNav + "' target='_blank'>ここへ行く</a>"
  );

});

</script>

</body>
