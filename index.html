<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>わんわんコインマップ</title>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<style>
html, body{
  margin:0;
  padding:0;
  font-family:sans-serif;
}

body{
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.controls{
  padding:4px 10px 2px;
  flex:0 0 auto;
}

h2{
  margin:2px 0 6px;
  font-size:20px;
  line-height:1.2;
}

#count{
  font-size:16px;
  font-weight:700;
}

button{
  padding:6px 10px;
  margin:2px;
  font-size:13px;
  border-radius:6px;
}

#map{
  flex:1 1 auto;
  min-height:0;
  width:100%;
}
</style>



</head>

<body>

<div class="controls">

<h2>🐕わんわんコイン <span id="count"></span></h2>

<button id="btn500">500m</button>
<button id="btn1k">1km</button>
<button id="btn3k">3km</button>
<button id="btnAll">全部</button>
<button id="btnLocate">現在地</button>



</div>

<div id="map"></div>

<script>

const map = L.map('map').setView([33.8392,132.7657],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);

let spotsRaw=[];
let markers=[];

let shibaCluster = L.markerClusterGroup({
  maxClusterRadius: 35,
  disableClusteringAtZoom: 14,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
  removeOutsideVisibleBounds: true,
  chunkedLoading: true
});
let bulldogCluster = L.markerClusterGroup({
  maxClusterRadius: 35,
  disableClusteringAtZoom: 14,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
  removeOutsideVisibleBounds: true,
  chunkedLoading: true
});

map.addLayer(shibaCluster);
map.addLayer(bulldogCluster);

let userLatLng=null;
let userMarker=null;
let userCircle=null;

let currentRadius=null;

let watchId=null;
const shibaIcon=L.icon({
iconUrl:'shiba.png',
iconSize:[36,44],
iconAnchor:[18,44]
});

const bulldogIcon=L.icon({
iconUrl:'bulldog.png',
iconSize:[36,44],
iconAnchor:[18,44]
});

const pomeIcon=L.icon({
iconUrl:'pome.png',
iconSize:[36,44],
iconAnchor:[18,44]
});


function show(t){
  console.log(t);
}
function setRadiusCircle(m){

if(userCircle) map.removeLayer(userCircle);

userCircle=L.circle(userLatLng,{
radius:m
}).addTo(map);

}

function normalizeSpots(arr){

return arr.map(s=>({
lat:Number(s.lat),
lng:Number(s.lng),
type:s.type||"nky"
}));

}

function renderMarkers(){

markers.forEach(m=>map.removeLayer(m));
markers=[];

shibaCluster.clearLayers();
bulldogCluster.clearLayers();

let count=0;

spotsRaw.forEach(s=>{

if(currentRadius && userLatLng){

const d=userLatLng.distanceTo([s.lat,s.lng]);

if(d>currentRadius) return;

}

let icon=shibaIcon;

if(s.type==="bul") icon=bulldogIcon;
if(s.type==="pom") icon=pomeIcon;

const m=L.marker([s.lat,s.lng],{
icon:icon
});

if(s.type==="bul"){
bulldogCluster.addLayer(m);
}
else if(s.type==="pom"){
m.addTo(map);
markers.push(m);
}
else{
shibaCluster.addLayer(m);
}

count++;

});

document.getElementById("count").textContent = spotsRaw.length + "台";

}



function updateUserMarker(lat,lng){

userLatLng=L.latLng(lat,lng);

if(userMarker) map.removeLayer(userMarker);

const pawIcon=L.icon({
iconUrl:'paw_pin.png',
iconSize:[36,44],
iconAnchor:[18,44]
});

userMarker=L.marker(userLatLng,{icon:pawIcon}).addTo(map);

map.setView(userLatLng,15);

}

const DISCOVER_RADIUS_M=15;
const discovered=new Set();
let lastVibeAt=0;

function keyOf(s){

return `${Number(s.lat).toFixed(6)},${Number(s.lng).toFixed(6)},${s.type}`;

}

function vibrateOnce(){

const now=Date.now();

if(now-lastVibeAt<8000) return;

lastVibeAt=now;

if(navigator.vibrate) navigator.vibrate([80]);

}

function checkDiscoveries(coords){

if(!userLatLng) return;

let hit=0;

for(const s of spotsRaw){

const k=keyOf(s);

if(discovered.has(k)) continue;

const d=userLatLng.distanceTo([s.lat,s.lng]);

if(d<=DISCOVER_RADIUS_M){

discovered.add(k);
hit++;

}

}

if(hit>0){

vibrateOnce();

show(`🐾 発見 +${hit}（合計 ${discovered.size}）`);

setTimeout(()=>{

renderMarkers();

},1500);

}

}

async function loadSpots(){

show("データ読み込み中...");

const res=await fetch("spots.json",{cache:"no-store"});

const data=await res.json();

spotsRaw=normalizeSpots(data);

renderMarkers();

}

document.getElementById("btnAll").addEventListener("click",()=>{

currentRadius=null;

if(userCircle){
map.removeLayer(userCircle);
userCircle=null;
}

renderMarkers();

});

document.getElementById("btn500").addEventListener("click",()=>{

currentRadius=500;

if(userLatLng) setRadiusCircle(500);

renderMarkers();

});

document.getElementById("btn1k").addEventListener("click",()=>{

currentRadius=1000;

if(userLatLng) setRadiusCircle(1000);

renderMarkers();

});

document.getElementById("btn3k").addEventListener("click",()=>{

currentRadius=3000;

if(userLatLng) setRadiusCircle(3000);

renderMarkers();

});

document.getElementById("btnLocate").addEventListener("click",()=>{

if(!navigator.geolocation){

show("位置情報が使えません");
return;

}

if(watchId!==null){

navigator.geolocation.clearWatch(watchId);
watchId=null;

show("現在地追跡OFF");

return;

}

show("現在地追跡ON");

watchId=navigator.geolocation.watchPosition(

(pos)=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

updateUserMarker(lat,lng);

if(currentRadius!=null) setRadiusCircle(currentRadius);

renderMarkers();

checkDiscoveries(pos.coords);

},

(err)=>{

show("現在地取得失敗");

},

{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
}

);

});

loadSpots();

setTimeout(() => {
  map.invalidateSize();
}, 300);

</script>

</body>
</html>
