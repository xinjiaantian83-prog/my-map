<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>わんわんコインマップ</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
}

#map{
height:70vh;
}

.controls{
padding:10px;
}

button{
padding:8px 12px;
margin:3px;
font-size:14px;
}

#status{
margin-top:8px;
font-size:14px;
}
</style>
</head>

<body>

<div class="controls">

<h2>わんわんコインマップ</h2>

<button id="btn500">500m</button>
<button id="btn1k">1km</button>
<button id="btn3k">3km</button>
<button id="btnAll">全部</button>
<button id="btnLocate">現在地</button>

<div id="status">読み込み中...</div>

</div>

<div id="map"></div>

<script>

const map = L.map('map').setView([33.8392,132.7657],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);

let spotsRaw=[];
let markers=[];

let userLatLng=null;
let userMarker=null;
let userCircle=null;

let currentRadius=null;

let watchId=null;

const statusEl=document.getElementById("status");

function show(t){
statusEl.textContent=t;
}

function setRadiusCircle(m){

if(userCircle) map.removeLayer(userCircle);

userCircle=L.circle(userLatLng,{
radius:m
}).addTo(map);

}

function normalizeSpots(arr){

return arr.map(s=>({
lat:Number(s.lat),
lng:Number(s.lng),
type:s.type||"nky"
}));

}

function renderMarkers(){

markers.forEach(m=>map.removeLayer(m));
markers=[];

let count=0;

spotsRaw.forEach(s=>{

if(currentRadius && userLatLng){

const d=userLatLng.distanceTo([s.lat,s.lng]);

if(d>currentRadius) return;

}

const m=L.marker([s.lat,s.lng],{
icon:L.icon({
iconUrl:'shiba_pin.png',
iconSize:[28,40],
iconAnchor:[14,40]
})
}).addTo(map);

markers.push(m);
count++;

});

show(`読み込みOK: ${spotsRaw.length}件中 ${count}件表示`);

}

function updateUserMarker(lat,lng){

userLatLng=L.latLng(lat,lng);

if(userMarker) map.removeLayer(userMarker);

const pawIcon=L.icon({
iconUrl:'paw_pin.png',
iconSize:[36,44],
iconAnchor:[18,44]
});

userMarker=L.marker(userLatLng,{icon:pawIcon}).addTo(map);

map.setView(userLatLng,15);

}

const DISCOVER_RADIUS_M=15;
const discovered=new Set();
let lastVibeAt=0;

function keyOf(s){

return `${Number(s.lat).toFixed(6)},${Number(s.lng).toFixed(6)},${s.type}`;

}

function vibrateOnce(){

const now=Date.now();

if(now-lastVibeAt<8000) return;

lastVibeAt=now;

if(navigator.vibrate) navigator.vibrate([80]);

}

function checkDiscoveries(coords){

if(!userLatLng) return;

let hit=0;

for(const s of spotsRaw){

const k=keyOf(s);

if(discovered.has(k)) continue;

const d=userLatLng.distanceTo([s.lat,s.lng]);

if(d<=DISCOVER_RADIUS_M){

discovered.add(k);
hit++;

}

}

if(hit>0){

vibrateOnce();

show(`🐾 発見 +${hit}（合計 ${discovered.size}）`);

setTimeout(()=>{

renderMarkers();

},1500);

}

}

async function loadSpots(){

show("データ読み込み中...");

const res=await fetch("spots.json",{cache:"no-store"});

const data=await res.json();

spotsRaw=normalizeSpots(data);

renderMarkers();

}

document.getElementById("btnAll").addEventListener("click",()=>{

currentRadius=null;

if(userCircle){
map.removeLayer(userCircle);
userCircle=null;
}

renderMarkers();

});

document.getElementById("btn500").addEventListener("click",()=>{

currentRadius=500;

if(userLatLng) setRadiusCircle(500);

renderMarkers();

});

document.getElementById("btn1k").addEventListener("click",()=>{

currentRadius=1000;

if(userLatLng) setRadiusCircle(1000);

renderMarkers();

});

document.getElementById("btn3k").addEventListener("click",()=>{

currentRadius=3000;

if(userLatLng) setRadiusCircle(3000);

renderMarkers();

});

document.getElementById("btnLocate").addEventListener("click",()=>{

if(!navigator.geolocation){

show("位置情報が使えません");
return;

}

if(watchId!==null){

navigator.geolocation.clearWatch(watchId);
watchId=null;

show("現在地追跡OFF");

return;

}

show("現在地追跡ON");

watchId=navigator.geolocation.watchPosition(

(pos)=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

updateUserMarker(lat,lng);

if(currentRadius!=null) setRadiusCircle(currentRadius);

renderMarkers();

checkDiscoveries(pos.coords);

},

(err)=>{

show("現在地取得失敗");

},

{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
}

);

});

loadSpots();

</script>

</body>
</html>
