<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わんわんコインマップ</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="わんコイン">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body { margin: 0; padding: 0; height: 100%; }
#map { height: 100vh; width: 100%; }

/* 距離切替UI */
#controls {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 1000;
  background: rgba(255,255,255,0.95);
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 10px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  font-size: 14px;
  min-width: 210px;
}
#controls .row { display: flex; gap: 6px; flex-wrap: wrap; }
#controls button {
  border: 1px solid #ccc;
  background: #fff;
  border-radius: 10px;
  padding: 8px 10px;
}
#controls button.active {
  border-color: #000;
  font-weight: 700;
}
#status {
  margin-top: 6px;
  font-size: 12px;
  opacity: 0.88;
  line-height: 1.3;
}

/* 現在地へ戻るボタン */
.locate-btn{
  width: 44px;
  height: 44px;
  border: none;
  background: #fff;
  font-size: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,.25);
  cursor: pointer;
}
.locate-btn:active{ transform: translateY(1px); }
</style>
 </head>
<body>

 <div id="dogMessage" style="
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,0.9);
padding:8px 16px;
border-radius:20px;
font-weight:bold;
z-index:9999;
opacity:0;
transition:opacity 0.4s;
">
</div>

  <div id="controls">
  <div class="row">
    <button data-radius="500" class="active">500m</button>
    <button data-radius="1000">1km</button>
    <button data-radius="3000">3km</button>
    <button data-radius="all">全部</button>
  </div>
  <div id="status">データ読み込み中…</div>
</div>

<div id="map"></div>

<script>
// ============================
// 1) spots.json を読み込む
// ============================
var spots = [];          // 実データ（読み込み後に入る）
var spotsLoaded = false; // 読めたかどうか

function setStatus(text) {
  document.getElementById('status').textContent = text;
}

function normalizeKey(lat, lng) {
  return Number(lat).toFixed(6) + "," + Number(lng).toFixed(6);
}

function dedupSpots(list) {
  var seen = {};
  var out = [];
  list.forEach(function(c){
    if (!Array.isArray(c) || c.length !== 2) return;
    var lat = Number(c[0]), lng = Number(c[1]);
    if (!isFinite(lat) || !isFinite(lng)) return;
    if (lat < -90 || lat > 90) return;
    if (lng < -180 || lng > 180) return;
    var k = normalizeKey(lat, lng);
    if (seen[k]) return;
    seen[k] = true;
    out.push([lat, lng]);
  });
  return out;
}

function loadSpotsJson() {
  // GitHub Pagesのキャッシュ対策で軽くクエリ付ける（更新反映が早くなる）
  var url = "spots.json?v=" + Date.now();
  return fetch(url, { cache: "no-store" })
    .then(function(res){
      if (!res.ok) throw new Error("spots.json load failed: " + res.status);
      return res.json();
    })
    .then(function(data){
      spots = dedupSpots(data);
      spotsLoaded = true;
      return spots;
    });
}

// ============================
// 2) 地図（UI重なり回避のためズームは右上）
// ============================
var map = L.map('map', { zoomControl: false }).setView([33.7864888, 132.7245295], 13);
L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// 柴犬ピン
var dogIcon = L.icon({
  iconUrl: 'IMG_7139.PNG',
  iconSize: [40, 40],
  iconAnchor: [20, 40]
});

// マーカー管理
var markers = [];
function clearMarkers() {
  markers.forEach(function(m){ map.removeLayer(m); });
  markers = [];
}

// 「ここへ行く」リンク生成（Googleマップ）
function googleNavUrl(lat, lng) {
  return "https://www.google.com/maps/dir/?api=1&destination=" + lat + "," + lng;
}

// 距離計算（メートル）: haversine
function distanceMeters(lat1, lon1, lat2, lon2) {
  var R = 6371000;
  var toRad = function(d){ return d * Math.PI / 180; };
  var dLat = toRad(lat2 - lat1);
  var dLon = toRad(lon2 - lon1);
  var a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
    Math.sin(dLon/2) * Math.sin(dLon/2);
  var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function formatDistance(m) {
  if (m == null || isNaN(m)) return "";
  if (m < 1000) return Math.round(m) + "m";
  return (m / 1000).toFixed(2) + "km";
}

function addMarkers(list) {
  // list: {lat,lng,dist} の配列
  list.forEach(function(item){
    var lat = item.lat, lng = item.lng;
    var m = L.marker([lat, lng], { icon: dogIcon }).addTo(map);

    var nav = googleNavUrl(lat, lng);

    var distHtml = "";
    if (item.dist != null && !isNaN(item.dist)) {
      distHtml = "<div>現在地から <b>" + formatDistance(item.dist) + "</b></div>";
    }

    m.bindPopup(
      "<b>自販機スポット</b><br>" +
      distHtml +
      "<a href='" + nav + "' target='_blank' rel='noopener'>ここへ行く</a>"
    );

    markers.push(m);
  });
}

// ---- 現在地表示（ピン + 精度円）----
var currentPos = null;
var myMarker = null;
var accuracyCircle = null;

function updateMyLocation(lat, lng, accuracyMeters) {
  currentPos = { lat: lat, lng: lng };

  if (!myMarker) {
    myMarker = L.marker([lat, lng]).addTo(map).bindPopup("あなたの現在地");
  } else {
    myMarker.setLatLng([lat, lng]);
  }

  if (!accuracyCircle) {
    accuracyCircle = L.circle([lat, lng], {
      radius: Math.max(accuracyMeters || 0, 10),
      weight: 1,
      fillOpacity: 0.12
    }).addTo(map);
  } else {
    accuracyCircle.setLatLng([lat, lng]);
    accuracyCircle.setRadius(Math.max(accuracyMeters || 0, 10));
  }
}

// ---- 半径円（フィルタ範囲）----
var currentRadius = 500; // default
var rangeCircle = null;

function updateRangeCircle() {
  if (!currentPos) return;

  if (currentRadius === 'all') {
    if (rangeCircle) {
      map.removeLayer(rangeCircle);
      rangeCircle = null;
    }
    return;
  }

  var lat = currentPos.lat, lng = currentPos.lng;
  if (!rangeCircle) {
    rangeCircle = L.circle([lat, lng], {
      radius: currentRadius,
      weight: 1,
      fillOpacity: 0.08
    }).addTo(map);
  } else {
    rangeCircle.setLatLng([lat, lng]);
    rangeCircle.setRadius(currentRadius);
  }
}

// ---- 現在地へ戻るボタン（右下）----
var LocateControl = L.Control.extend({
  options: { position: "bottomright" },
  onAdd: function() {
    var btn = L.DomUtil.create("button", "leaflet-bar locate-btn");
    btn.type = "button";
    btn.title = "現在地へ戻る";
    btn.innerHTML = "📍";

    L.DomEvent.disableClickPropagation(btn);
    L.DomEvent.on(btn, "click", function(e){
      L.DomEvent.stop(e);
      if (!currentPos) {
        alert("現在地がまだ取得できていません");
        return;
      }
      map.setView([currentPos.lat, currentPos.lng], 15, { animate: true });
    });

    return btn;
  }
});
map.addControl(new LocateControl());

// ---- 表示更新 ----
function refresh() {
  clearMarkers();

  // データ未読なら何もしない
  if (!spotsLoaded) {
    setStatus("データ読み込み中…");
    return;
  }

  // 現在地が取れてない間は全部表示（迷わない）
  if (!currentPos) {
    addMarkers(spots.map(function(c){
      return { lat: c[0], lng: c[1], dist: null };
    }));
    setStatus("現在地未取得：全件表示中（位置情報を許可してね） / 全" + spots.length + "件");
    return;
  }

  updateRangeCircle();

  var lat = currentPos.lat, lng = currentPos.lng;

  if (currentRadius === 'all') {
    var allWithDist = spots.map(function(c){
      return { lat: c[0], lng: c[1], dist: distanceMeters(lat, lng, c[0], c[1]) };
    }).sort(function(a, b){
      return a.dist - b.dist;
    });

    addMarkers(allWithDist);
    setStatus("全件表示中（ピンをタップで距離） / 全" + spots.length + "件");
    return;
  }

  var filtered = spots.map(function(c){
    return { lat: c[0], lng: c[1], dist: distanceMeters(lat, lng, c[0], c[1]) };
  }).filter(function(item){
    return item.dist <= currentRadius;
  }).sort(function(a, b){
    return a.dist - b.dist;
  });

  addMarkers(filtered);

  var rText = (currentRadius >= 1000) ? (currentRadius/1000 + "km") : (currentRadius + "m");

  if (filtered.length === 0) {
    setStatus("半径 " + rText + " にありません。\n距離を広げてみてね。");
  } else {
    setStatus("半径 " + rText + "： " + filtered.length + "件（ピンをタップで距離） / 全" + spots.length + "件");
  }
}

// ---- 位置情報（watchPosition）----
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(function(pos){
    var lat = pos.coords.latitude;
    var lng = pos.coords.longitude;
    var acc = pos.coords.accuracy;

    updateMyLocation(lat, lng, acc);

    if (!window.__didCenterOnce) {
      window.__didCenterOnce = true;
      map.setView([lat, lng], 15);
    }

    refresh();
  }, function(){
    refresh();
  }, { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 });
} else {
  refresh();
}

// ---- ボタン操作 ----
document.querySelectorAll('#controls button').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('#controls button').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');

    var v = btn.getAttribute('data-radius');
    currentRadius = (v === 'all') ? 'all' : parseInt(v, 10);

    refresh();
  });
});

// ---- 起動時：spots.json を読み込む ----
loadSpotsJson().then(function(){
  refresh();
}).catch(function(err){
  spotsLoaded = false;
});
  

/* ← ここに貼る */

function showDogMessage() {
  const messages = [
    "水分補給するワン🐶",
    "無理するなワン。",
    "今日も安全第一だワン。",
    "焦らずいこうワン。"
  ];

  const msgBox = document.getElementById("dogMessage");
  const randomIndex = Math.floor(Math.random() * messages.length);

  msgBox.textContent = messages[randomIndex];
  msgBox.style.opacity = "1";

  setTimeout(() => {
    msgBox.style.opacity = "0";
  }, 2500);
}
// window.addEventListener("load", () => setTimeout(showDogMessage, 500));

</script>
</body>
</html>
