<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>自販機マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
}
#map {
    height: 100vh;
    width: 100%;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

// ▼ 初期表示位置（好きに変えられる）
var map = L.map('map').setView([33.7864888, 132.7245295], 13);

// ▼ 地図タイル
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);


// ▼ 自販機データ（ここに増やしていく）
var vendingSpots = [
    {
        name: "テスト自販機①",
        lat: 33.7864888,
        lng: 132.7245295
    }
];


// ▼ マーカー生成
vendingSpots.forEach(function(spot) {

    var marker = L.marker([spot.lat, spot.lng]).addTo(map);

    var googleNav =
        "https://www.google.com/maps/dir/?api=1&destination="
        + spot.lat + "," + spot.lng;

    marker.bindPopup(
        "<b>" + spot.name + "</b><br><br>" +
        "<a href='" + googleNav + "' target='_blank'>ここへ行く</a>"
    );

});

</script>

</body>
</html>
