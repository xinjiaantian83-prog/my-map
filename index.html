<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わんわんコインマップ</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="わんコイン">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body { margin: 0; padding: 0; height: 100%; }
#map { height: 100vh; width: 100%; }

/* 距離切替UI */
#controls {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 1000;
  background: rgba(255,255,255,0.95);
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 10px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  font-size: 14px;
  min-width: 210px;
}
#controls .row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
#controls button {
  border: 1px solid #ccc;
  background: #fff;
  border-radius: 10px;
  padding: 8px 10px;
}
#controls button.active {
  border-color: #000;
  font-weight: 700;
}
#status {
  margin-top: 6px;
  font-size: 12px;
  opacity: 0.88;
  line-height: 1.3;
}

/* 現在地へ戻るボタン */
.locate-btn{
  width: 44px;
  height: 44px;
  border: none;
  background: #fff;
  font-size: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,.25);
  cursor: pointer;
}
.locate-btn:active{ transform: translateY(1px); }

/* 追加枠UI */
#adminPanel {
  position: fixed;
  left: 12px;
  top: 102px; /* controls の下あたり */
  z-index: 1000;
  width: min(360px, calc(100vw - 24px));
  background: rgba(255,255,255,0.95);
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 10px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  font-size: 13px;
  display: none;
}
#adminPanel h3{
  margin: 0 0 6px;
  font-size: 13px;
}
#adminPanel textarea{
  width: 100%;
  height: 84px;
  border: 1px solid #ccc;
  border-radius: 10px;
  padding: 8px;
  box-sizing: border-box;
  font-size: 13px;
}
#adminPanel .row{
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}
#adminPanel .note{
  margin-top: 6px;
  font-size: 12px;
  opacity: 0.85;
  line-height: 1.25;
}
.smallBtn{
  border: 1px solid #ccc;
  background: #fff;
  border-radius: 10px;
  padding: 8px 10px;
}
.smallBtn.danger{
  border-color: #d55;
}
</style>
</head>

<body>
<div id="controls">
  <div class="row">
    <button data-radius="500" class="active">500m</button>
    <button data-radius="1000">1km</button>
    <button data-radius="3000">3km</button>
    <button data-radius="all">全部</button>
    <button id="toggleAdmin" class="smallBtn" type="button">追加</button>
  </div>
  <div id="status">現在地を取得中…（許可してね）</div>
</div>

<!-- 座標追加パネル（端末内保存） -->
<div id="adminPanel">
  <h3>座標追加（この端末に保存）</h3>
  <textarea id="coordInput" placeholder="例：
(33.7602936, 132.7037820) (33.7590825, 132.7036603)
33.7568455,132.7012506
などをまとめて貼ってOK"></textarea>
  <div class="row">
    <button id="btnAddCoords" class="smallBtn" type="button">追加して保存</button>
    <button id="btnClearSaved" class="smallBtn danger" type="button">保存分を全消し</button>
  </div>
  <div class="note">
    ・追加した座標はこのスマホ/PCにだけ保存（投稿ではない）<br>
    ・重複は自動で除外
  </div>
</div>

<div id="map"></div>

<script>
// ============================
// 1) ベース座標（GitHubに置いてる固定分）
// ============================
var baseSpots = [
  [33.7726943,132.7420953],
  [33.7787246,132.7334036],
  [33.7860538,132.7700416],
  [33.8034033,132.8846008],
  [33.7910892,132.8316751],
  [33.8046770,132.7797834],
  [33.7711199,132.7880211],
  [33.7599650,132.7889663],
  [33.7390628,132.7932565],
  [33.7351421,132.7927763],
  [33.7421107,132.7921276],
  [33.7444029,132.7923673],
  [33.8094331,132.6991143],
  [33.8089272,132.7013201],
  [33.8117082,132.8199307],
  [33.8105922,132.7298708],
  [33.8156763,132.7345231],
  [33.7912987,132.7206806],
  [33.8300203,132.7251123],
  [33.8215540,132.7643684],
  [33.8080507,132.8060831],
  [33.8156011,132.7316444],
  [33.8156332,132.7256038],
  [33.8156070,132.7217994],
  [33.8155504,132.7190531],
  [33.8145504,132.7039929],
  [33.8016963,132.7655087],
  [33.7970574,132.7550900],
  [33.7894327,132.7383597],
  [33.7849564,132.7142030],
  [33.7535562,132.7061742],
  [33.7505099,132.6987807],
  [33.7483915,132.6984045],
  [33.7496150,132.6974225],
  [33.7577386,132.6999608],
  [33.7667983,132.7041464],
  [33.7667957,132.7024747],
  [33.7794684,132.7044167],
  [33.7818928,132.7089291],
  [33.7828119,132.7091038],
  [33.7875802,132.7023024],
  [33.7942018,132.7017844],
  [33.8027441,132.7315294],
  [33.8027296,132.7295476],
  [33.7974196,132.7247317],
  [33.7934830,132.7277824],
  [33.8220002,132.7275799],
  [33.8200535,132.7242814]
];

// ============================
// 2) 端末保存（localStorage）分を合体して使う spots を作る
// ============================
var LS_KEY = "wanwan_saved_spots_v1";

function normalizeKey(lat, lng) {
  // 小数の揺れ吸収（だいたい1m程度）: 6桁に丸めてキー化
  var a = Number(lat).toFixed(6);
  var b = Number(lng).toFixed(6);
  return a + "," + b;
}

function loadSavedSpots() {
  try {
    var raw = localStorage.getItem(LS_KEY);
    if (!raw) return [];
    var arr = JSON.parse(raw);
    if (!Array.isArray(arr)) return [];
    // [ [lat,lng], ... ] だけ許す
    return arr.filter(function(x){
      return Array.isArray(x) && x.length === 2 && isFinite(x[0]) && isFinite(x[1]);
    });
  } catch(e) {
    return [];
  }
}

function saveSavedSpots(arr) {
  localStorage.setItem(LS_KEY, JSON.stringify(arr));
}

function mergeDedup(base, extra) {
  var seen = {};
  var out = [];

  function pushIfNew(lat, lng) {
    var k = normalizeKey(lat, lng);
    if (seen[k]) return;
    seen[k] = true;
    out.push([Number(lat), Number(lng)]);
  }

  base.forEach(function(c){ pushIfNew(c[0], c[1]); });
  extra.forEach(function(c){ pushIfNew(c[0], c[1]); });

  return out;
}

var savedSpots = loadSavedSpots();
var spots = mergeDedup(baseSpots, savedSpots);

// ============================
// 3) 地図
// ============================
// ★ズーム(＋－)は右上に（controlsと重ならない）
var map = L.map('map', { zoomControl: false }).setView([33.7864888, 132.7245295], 13);
L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// 柴犬ピン
var dogIcon = L.icon({
  iconUrl: 'IMG_7139.PNG',
  iconSize: [40, 40],
  iconAnchor: [20, 40]
});

// マーカー管理
var markers = [];
function clearMarkers() {
  markers.forEach(function(m){ map.removeLayer(m); });
  markers = [];
}

// 「ここへ行く」リンク生成（Googleマップ）
function googleNavUrl(lat, lng) {
  return "https://www.google.com/maps/dir/?api=1&destination=" + lat + "," + lng;
}

// 距離計算（メートル）: haversine
function distanceMeters(lat1, lon1, lat2, lon2) {
  var R = 6371000;
  var toRad = function(d){ return d * Math.PI / 180; };
  var dLat = toRad(lat2 - lat1);
  var dLon = toRad(lon2 - lon1);
  var a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
    Math.sin(dLon/2) * Math.sin(dLon/2);
  var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function formatDistance(m) {
  if (m == null || isNaN(m)) return "";
  if (m < 1000) return Math.round(m) + "m";
  return (m / 1000).toFixed(2) + "km";
}

function addMarkers(list) {
  // list: {lat,lng,dist} の配列
  list.forEach(function(item){
    var lat = item.lat, lng = item.lng;
    var m = L.marker([lat, lng], { icon: dogIcon }).addTo(map);

    var nav = googleNavUrl(lat, lng);

    var distHtml = "";
    if (item.dist != null && !isNaN(item.dist)) {
      distHtml = "<div>現在地から <b>" + formatDistance(item.dist) + "</b></div>";
    }

    m.bindPopup(
      "<b>自販機スポット</b><br>" +
      distHtml +
      "<a href='" + nav + "' target='_blank' rel='noopener'>ここへ行く</a>"
    );

    markers.push(m);
  });
}

// ---- 現在地表示（ピン + 精度円）----
var currentPos = null;
var myMarker = null;
var accuracyCircle = null;

function updateMyLocation(lat, lng, accuracyMeters) {
  currentPos = { lat: lat, lng: lng };

  if (!myMarker) {
    myMarker = L.marker([lat, lng]).addTo(map).bindPopup("あなたの現在地");
  } else {
    myMarker.setLatLng([lat, lng]);
  }

  if (!accuracyCircle) {
    accuracyCircle = L.circle([lat, lng], {
      radius: Math.max(accuracyMeters || 0, 10),
      weight: 1,
      fillOpacity: 0.12
    }).addTo(map);
  } else {
    accuracyCircle.setLatLng([lat, lng]);
    accuracyCircle.setRadius(Math.max(accuracyMeters || 0, 10));
  }
}

// ---- 半径円（フィルタ範囲）----
var currentRadius = 500; // default
var rangeCircle = null;

function updateRangeCircle() {
  if (!currentPos) return;

  if (currentRadius === 'all') {
    if (rangeCircle) {
      map.removeLayer(rangeCircle);
      rangeCircle = null;
    }
    return;
  }

  var lat = currentPos.lat, lng = currentPos.lng;
  if (!rangeCircle) {
    rangeCircle = L.circle([lat, lng], {
      radius: currentRadius,
      weight: 1,
      fillOpacity: 0.08
    }).addTo(map);
  } else {
    rangeCircle.setLatLng([lat, lng]);
    rangeCircle.setRadius(currentRadius);
  }
}

// ---- 現在地へ戻るボタン（右下）----
var LocateControl = L.Control.extend({
  options: { position: "bottomright" },
  onAdd: function() {
    var btn = L.DomUtil.create("button", "leaflet-bar locate-btn");
    btn.type = "button";
    btn.title = "現在地へ戻る";
    btn.innerHTML = "📍";

    L.DomEvent.disableClickPropagation(btn);
    L.DomEvent.on(btn, "click", function(e){
      L.DomEvent.stop(e);
      if (!currentPos) {
        alert("現在地がまだ取得できていません");
        return;
      }
      map.setView([currentPos.lat, currentPos.lng], 15, { animate: true });
    });

    return btn;
  }
});
map.addControl(new LocateControl());

// ---- 表示更新 ----
function refresh() {
  clearMarkers();

  if (!currentPos) {
    var allNoDist = spots.map(function(c){
      return { lat: c[0], lng: c[1], dist: null };
    });
    addMarkers(allNoDist);
    document.getElementById('status').textContent =
      "現在地未取得：全件表示中（位置情報を許可してね） / 全" + spots.length + "件";
    return;
  }

  updateRangeCircle();

  var lat = currentPos.lat, lng = currentPos.lng;

  if (currentRadius === 'all') {
    var allWithDist = spots.map(function(c){
      return { lat: c[0], lng: c[1], dist: distanceMeters(lat, lng, c[0], c[1]) };
    }).sort(function(a, b){
      return a.dist - b.dist;
    });

    addMarkers(allWithDist);
    document.getElementById('status').textContent =
      "全件表示中（ピンをタップで距離） / 全" + spots.length + "件";
    return;
  }

  var filtered = spots.map(function(c){
    return { lat: c[0], lng: c[1], dist: distanceMeters(lat, lng, c[0], c[1]) };
  }).filter(function(item){
    return item.dist <= currentRadius;
  }).sort(function(a, b){
    return a.dist - b.dist;
  });

  addMarkers(filtered);

  var rText = (currentRadius >= 1000) ? (currentRadius/1000 + "km") : (currentRadius + "m");

  if (filtered.length === 0) {
    document.getElementById('status').textContent =
      "半径 " + rText + " にありません。\n距離を広げてみてね。";
  } else {
    document.getElementById('status').textContent =
      "半径 " + rText + "： " + filtered.length + "件（ピンをタップで距離） / 全" + spots.length + "件";
  }
}

// ---- 位置情報（watchPosition）----
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(function(pos){
    var lat = pos.coords.latitude;
    var lng = pos.coords.longitude;
    var acc = pos.coords.accuracy;

    updateMyLocation(lat, lng, acc);

    if (!window.__didCenterOnce) {
      window.__didCenterOnce = true;
      map.setView([lat, lng], 15);
    }

    refresh();
  }, function(){
    refresh();
  }, { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 });
} else {
  refresh();
}

// ---- フィルタボタン操作 ----
document.querySelectorAll('#controls button[data-radius]').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('#controls button[data-radius]').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');

    var v = btn.getAttribute('data-radius');
    currentRadius = (v === 'all') ? 'all' : parseInt(v, 10);

    refresh();
  });
});

// ============================
// 4) 追加枠（貼り付け→追加→保存）
// ============================
function parseCoords(text) {
  // (lat, lng) / lat,lng / 空白区切り なんでも吸収
  // 数字を全部拾って2個ずつペアにする
  var nums = (text.match(/-?\d+(?:\.\d+)?/g) || []).map(Number);
  var out = [];
  for (var i = 0; i + 1 < nums.length; i += 2) {
    var lat = nums[i], lng = nums[i+1];
    if (!isFinite(lat) || !isFinite(lng)) continue;
    if (lat < -90 || lat > 90) continue;
    if (lng < -180 || lng > 180) continue;
    out.push([lat, lng]);
  }
  return out;
}

var adminPanel = document.getElementById("adminPanel");
document.getElementById("toggleAdmin").addEventListener("click", function(){
  adminPanel.style.display = (adminPanel.style.display === "none" || adminPanel.style.display === "") ? "block" : "none";
});

document.getElementById("btnAddCoords").addEventListener("click", function(){
  var text = document.getElementById("coordInput").value || "";
  var parsed = parseCoords(text);
  if (parsed.length === 0) {
    alert("座標が見つからないよ。例の形式で貼ってね。");
    return;
  }

  // saved に足して保存（重複除去）
  savedSpots = mergeDedup(savedSpots, parsed);
  saveSavedSpots(savedSpots);

  // 表示用 spots を再生成
  spots = mergeDedup(baseSpots, savedSpots);

  document.getElementById("coordInput").value = "";
  alert("追加した！ 保存：" + parsed.length + "件 / 合計：" + spots.length + "件");

  refresh();
});

document.getElementById("btnClearSaved").addEventListener("click", function(){
  if (!confirm("この端末に保存した追加分を全消しする？（ベース分は消えない）")) return;
  savedSpots = [];
  saveSavedSpots(savedSpots);
  spots = mergeDedup(baseSpots, savedSpots);
  alert("保存分を消した！ 合計：" + spots.length + "件");
  refresh();
});
</script>
</body>
</html>
