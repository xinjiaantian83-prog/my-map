<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>わんわんコインマップ</title>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<style>
html, body{
  margin:0;
  padding:0;
  font-family:sans-serif;
}

body{
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.controls{
  padding:6px 6px 4px;
  flex:0 0 auto;

  background:#ffffff;
  box-shadow:0 6px 18px rgba(0,0,0,0.18);
  border-radius:16px;
  margin:6px 6px 0;
}

h2{
  margin:0 0 4px;
  line-height:1;
}

/* タイトル */
.title-main{
  font-size:22px;
  font-weight:900;
  letter-spacing:-0.01em;
}

/* 発見数 */
#count{
  font-size:17px;
  font-weight:800;
}

button{
  padding:4px 8px;
  margin:2px 1px;
  font-size:11px;

  border-radius:18px;
  border:none;

  background:#f3f4f6;
  color:#333;

  font-weight:700;
  transition:all 0.15s ease;
}

button.active{
  background:#2b7de9;
  color:#fff;

  box-shadow:
    0 2px 6px rgba(0,0,0,0.25),
    inset 0 1px 0 rgba(255,255,255,0.25);
}
  button:active{
  transform:scale(0.95);
}
#map{
  flex:1 1 auto;
  min-height:0;
  width:100%;
}

/* ===== コインクラスタ（完全版）===== */

.coin-cluster{
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
}

.coin-cluster > div{
  width: 60px;
  height: 60px;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
}

.coin{
  position: relative;
  width: 60px;
  height: 60px;
  overflow: hidden;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #f5f5f5, #cfcfcf 70%, #9e9e9e);
  border: 2px solid #e8e8e8;
  box-shadow:
    inset 0 2px 3px rgba(255,255,255,0.8),
    inset 0 -2px 3px rgba(0,0,0,0.2),
    0 2px 4px rgba(0,0,0,0.25);
}

.coin img{
  position: absolute;
  width: 28px;
  height: 28px;
  left: 10px;
  top: 6px;
  object-fit: contain;
  opacity: 0.28;
  pointer-events: none;
}

.coin span{
  position: absolute;
  left: 0;
  right: 0;
  bottom: 3px;
  text-align: center;
  font-weight: 800;
  font-size: 14px;
  line-height: 1;
  color: #ffffff;
  text-shadow:
    0 1px 2px rgba(0,0,0,0.95),
    0 0 4px rgba(0,0,0,0.75);
  pointer-events: none;
}

.spot-card{
  position: relative;
  background: #fffdf8;
  border: 2px solid #d8c9ae;
  border-radius: 14px;
  padding: 14px 12px 12px;
  min-width: 180px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.18);
}

.card-close{
  position: absolute;
  top: 6px;
  right: 6px;
  border: none;
  background: transparent;
  padding: 0;
  margin: 0;
  line-height: 0;
}

.bone-close{
  width: 26px;
  height: 26px;
  cursor: pointer;
  display: block;
  opacity: 0.95;
  transition: transform 0.12s ease, opacity 0.12s ease;
}

.bone-close:hover{
  transform: scale(1.06);
  opacity: 1;
}

.leaflet-popup-content-wrapper{
  border-radius: 14px;
  padding: 0;
}

.leaflet-popup-content{
  margin: 0;
}

.spot-title{
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 10px;
  padding-right: 30px;
}

.spot-actions{
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.spot-btn{
  width: 100%;
  border: none;
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}

.spot-btn-go{
  background: #f3f7ff;
}

.spot-btn-record{
  background: #fff4d6;
}

.spot-note{
  margin-top: 8px;
  font-size: 12px;
  color: #666;
  line-height: 1.4;
}
  #discoverPopup{
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 18px 28px;
  border-radius: 14px;
  font-size: 20px;
  font-weight: bold;
  text-align:center;
  z-index: 9999;
  display: none;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}
  .found-flash{
  animation: foundFlash 0.8s ease;
}

@keyframes foundFlash{
  0%{
    transform: scale(1);
    filter: brightness(1);
  }
  40%{
    transform: scale(1.4);
    filter: brightness(2);
  }
  100%{
    transform: scale(1);
    filter: brightness(1);
  }
}
</style>
</head>

<body>

<div class="controls">

<h2>
  <span class="title-main">🐕 わんわん探索隊</span><br>
  <span id="count"></span>
</h2>

<button id="btn500" class="range-btn">500m</button>
<button id="btn1k" class="range-btn">1km</button>
<button id="btn3k" class="range-btn">3km</button>
<button id="btnAll" class="range-btn active">全部</button>
<button id="btnLocate">位置</button>
<button id="btnCluster" class="active">集約</button>
</div>

<div id="map"></div>
  <div id="discoverPopup">
✨ 補給所発見！<br>
探索ポイント +1
</div>

<script>
  const foundSound = new Audio("chieuk-coin-257878.mp3");
const ESTIMATED_TOTAL = 1500;

function setRangeActive(btn){
  document.querySelectorAll(".range-btn")
    .forEach(b => b.classList.remove("active"));

  btn.classList.add("active");
}
const map = L.map('map').setView([33.8392,132.7657],13);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
{maxZoom:19}
).addTo(map);

let spotsRaw=[];
let markers=[];

let shibaCluster = L.markerClusterGroup({
  maxClusterRadius: 35,
  disableClusteringAtZoom: 15,
  spiderfyOnMaxZoom: false,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
  removeOutsideVisibleBounds: true,
  chunkedLoading: true,
  iconCreateFunction: function(cluster) {
    const count = cluster.getChildCount();

    return L.divIcon({
      html: `
        <div class="coin">
          <img src="shiba.png">
          <span>${count}</span>
        </div>
      `,
      className: "coin-cluster",
      iconSize: L.point(60,60)
    });
  }
});

let bulldogCluster = L.markerClusterGroup({
  maxClusterRadius: 35,
  disableClusteringAtZoom: 15,
  spiderfyOnMaxZoom: false,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
  removeOutsideVisibleBounds: true,
  chunkedLoading: true,
  iconCreateFunction: function(cluster) {
    const count = cluster.getChildCount();

    return L.divIcon({
      html: `
        <div class="coin">
          <img src="bulldog.png">
          <span>${count}</span>
        </div>
      `,
      className: "coin-cluster",
      iconSize: L.point(60,60)
    });
  }
});

let pomeCluster = L.markerClusterGroup({
  maxClusterRadius: 35,
  disableClusteringAtZoom: 15,
  spiderfyOnMaxZoom: false,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
  removeOutsideVisibleBounds: true,
  chunkedLoading: true,
  iconCreateFunction: function(cluster) {
    const count = cluster.getChildCount();

    return L.divIcon({
      html: `
        <div class="coin">
          <img src="pome.png">
          <span>${count}</span>
        </div>
      `,
      className: "coin-cluster",
      iconSize: L.point(60,60)
    });
  }
});

map.addLayer(shibaCluster);
map.addLayer(bulldogCluster);
map.addLayer(pomeCluster);
let clusterEnabled = true;
let userLatLng=null;
let userMarker=null;
let userCircle=null;

let currentRadius=null;

let watchId=null;

const shibaIcon=L.icon({
  iconUrl:'shiba.png',
  iconSize:[30,36],
  iconAnchor:[15,36]
});

const bulldogIcon=L.icon({
  iconUrl:'bulldog.png',
  iconSize:[30,36],
  iconAnchor:[15,36]
});

const pomeIcon=L.icon({
  iconUrl:'pome.png',
  iconSize:[30,36],
  iconAnchor:[15,36]
});

function closePopup(){
  map.closePopup();
}

function goNav(lat,lng){
  const url = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
  location.href = url;
}

function updateCountText(){
  const found = spotsRaw.length;
  const percent = Math.round((found / ESTIMATED_TOTAL) * 100);
  document.getElementById("count").textContent =
    `発見数 ${found}台 / ${ESTIMATED_TOTAL}台（推定） ${percent}%`;
}

function recordFind(lat,lng,type){

  if(!userLatLng){
    alert("先に現在地をONにしてください");
    return;
  }

  let d = 0;
if(userLatLng){
  d = userLatLng.distanceTo([lat,lng]);
}

if(d > 30){
  
    alert("近くに行くと記録できます");
    return;
  }

  const k = `${Number(lat).toFixed(6)},${Number(lng).toFixed(6)},${type}`;

  if(discovered.has(k)){
    alert("この自販機は記録済みです");
    return;
  }

  
  
  foundSound.play();

const marker = map._popup && map._popup._source && map._popup._source._icon;
if(marker){
  marker.classList.add("found-flash");
  setTimeout(() => {
    marker.classList.remove("found-flash");
  }, 800);
}

const popup = document.getElementById("discoverPopup");
popup.style.display = "block";
setTimeout(() => {
  popup.style.display = "none";
}, 1500);

if (navigator.vibrate) {
  navigator.vibrate(200);
}

discovered.add(k);
vibrateOnce();
show(`🐾 発見 +1（合計 ${discovered.size}）`);

setTimeout(() => {
  map.closePopup();
  renderMarkers();
}, 850);
}

function show(t){
  console.log(t);
}

function setRadiusCircle(m){
  if(userCircle) map.removeLayer(userCircle);

  userCircle=L.circle(userLatLng,{
radius:m,
color:"#4da6ff",
fillColor:"#4da6ff",
fillOpacity:0.10,
weight:2,
dashArray:"6,6"
}).addTo(map);
}

function normalizeSpots(arr){
  return arr.map(s=>({
    lat:Number(s.lat),
    lng:Number(s.lng),
    type:s.type||"nky"
  }));
}

function renderMarkers(){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  shibaCluster.clearLayers();
  bulldogCluster.clearLayers();
  pomeCluster.clearLayers();

  spotsRaw.forEach(s=>{
    if(currentRadius && userLatLng){
      const d=userLatLng.distanceTo([s.lat,s.lng]);
      if(d>currentRadius) return;
    }

    let icon=shibaIcon;

    if(s.type==="bul") icon=bulldogIcon;
    if(s.type==="pom") icon=pomeIcon;

    const m=L.marker([s.lat,s.lng],{
      icon:icon
    });

    const k = keyOf(s);
    const isFound = discovered.has(k);
    const k = keyOf(s);
    const isFound = discovered.has(k);
   const k = keyOf(s);
    const isFound = discovered.has(k);
    const canRecord = userLatLng && userLatLng.distanceTo([s.lat,s.lng]) <= 30;

    let title = "🐕 シバ自販機";
    if(s.type==="bul") title = "🐶 ブル自販機";
    if(s.type==="pom") title = "🐩 ポメ自販機";

    let recordPart = "";

    if(isFound){
      recordPart = `<div class="spot-note">✅ 記録済み</div>`;
    }else if(canRecord){
      recordPart = `<button class="spot-btn spot-btn-record" onclick="recordFind(${s.lat},${s.lng},'${s.type}')">発見を記録</button>`;
    }else{
      recordPart = `<div class="spot-note">近くに行くと記録できます</div>`;
    }

    m.bindPopup(`
      <div class="spot-card">
        <button class="card-close" onclick="closePopup()" aria-label="閉じる">
          <svg class="bone-close" viewBox="0 0 64 64" aria-hidden="true">
            <g transform="rotate(45 32 32)">
              <rect x="20" y="28" width="24" height="8" rx="4"
                fill="#f5f1e8"
                stroke="#7a6a58"
                stroke-width="3"/>
              <circle cx="18" cy="26" r="6"
                fill="#f5f1e8"
                stroke="#7a6a58"
                stroke-width="3"/>
              <circle cx="18" cy="38" r="6"
                fill="#f5f1e8"
                stroke="#7a6a58"
                stroke-width="3"/>
              <circle cx="46" cy="26" r="6"
                fill="#f5f1e8"
                stroke="#7a6a58"
                stroke-width="3"/>
              <circle cx="46" cy="38" r="6"
                fill="#f5f1e8"
                stroke="#7a6a58"
                stroke-width="3"/>
            </g>

            <g transform="rotate(-45 32 32)">
              <rect x="20" y="28" width="24" height="8" rx="4"
                fill="#f5f1e8"
                stroke="#7a6a58"
                stroke-width="3"/>
              <circle cx="18" cy="26" r="6"
                fill="#f5f1e8"
                stroke="#7a6a58"
                stroke-width="3"/>
              <circle cx="18" cy="38" r="6"
                fill="#f5f1e8"
                stroke="#7a6a58"
                stroke-width="3"/>
              <circle cx="46" cy="26" r="6"
                fill="#f5f1e8"
                stroke="#7a6a58"
                stroke-width="3"/>
              <circle cx="46" cy="38" r="6"
                fill="#f5f1e8"
                stroke="#7a6a58"
                stroke-width="3"/>
            </g>
          </svg>
        </button>

        <div class="spot-title">${title}</div>

        <div class="spot-actions">
          <button class="spot-btn spot-btn-go" onclick="goNav(${s.lat},${s.lng})">ここへ行く</button>
          ${recordPart}
        </div>
      </div>
    `);

    if(clusterEnabled){
  if(s.type==="bul"){
    bulldogCluster.addLayer(m);
  }else if(s.type==="pom"){
    pomeCluster.addLayer(m);
  }else{
    shibaCluster.addLayer(m);
  }
}else{
  m.addTo(map);
  markers.push(m);
}
  });

  updateCountText();
}

function updateUserMarker(lat,lng){
  userLatLng=L.latLng(lat,lng);

  if(userMarker) map.removeLayer(userMarker);

  const pawIcon=L.icon({
    iconUrl:'paw_pin.png',
    iconSize:[36,44],
    iconAnchor:[18,44]
  });

  userMarker=L.marker(userLatLng,{icon:pawIcon}).addTo(map);

  map.setView(userLatLng,15);
}

const discovered=new Set();
let lastVibeAt=0;

function keyOf(s){
  return `${Number(s.lat).toFixed(6)},${Number(s.lng).toFixed(6)},${s.type}`;
}

function vibrateOnce(){
  const now=Date.now();

  if(now-lastVibeAt<8000) return;

  lastVibeAt=now;

  if(navigator.vibrate) navigator.vibrate([80]);
}

async function loadSpots(){
  show("データ読み込み中...");

  const res=await fetch("spots.json",{cache:"no-store"});
  const data=await res.json();

  spotsRaw=normalizeSpots(data);

  renderMarkers();
}

document.getElementById("btnAll").addEventListener("click",(e)=>{
  setRangeActive(e.target);
  currentRadius=null;

  if(userCircle){
    map.removeLayer(userCircle);
    userCircle=null;
  }

  renderMarkers();
});

document.getElementById("btnCluster").addEventListener("click",()=>{
  const btn = document.getElementById("btnCluster");

  clusterEnabled = !clusterEnabled;

  if(clusterEnabled){
    btn.classList.add("active");
  }else{
    btn.classList.remove("active");
  }

  renderMarkers();
});
document.getElementById("btn500").addEventListener("click",(e)=>{
  setRangeActive(e.target);
  currentRadius=500;

  if(userLatLng) setRadiusCircle(500);

  renderMarkers();
});

document.getElementById("btn1k").addEventListener("click",(e)=>{
  setRangeActive(e.target);
  currentRadius=1000;

  if(userLatLng) setRadiusCircle(1000);

  renderMarkers();
});
document.getElementById("btn3k").addEventListener("click",(e)=>{
  setRangeActive(e.target);
  currentRadius=3000;

  if(userLatLng) setRadiusCircle(3000);

  renderMarkers();
});
document.getElementById("btnLocate").addEventListener("click",()=>{
  const btn = document.getElementById("btnLocate");

  if(!navigator.geolocation){
    show("位置情報が使えません");
    return;
  }

  if(watchId!==null){
    navigator.geolocation.clearWatch(watchId);
    watchId=null;
    btn.classList.remove("active");
    show("現在地追跡OFF");
    return;
  }

  btn.classList.add("active");
  show("現在地追跡ON");

  watchId=navigator.geolocation.watchPosition(
    (pos)=>{
      const lat=pos.coords.latitude;
      const lng=pos.coords.longitude;

      updateUserMarker(lat,lng);

      if(currentRadius!=null) setRadiusCircle(currentRadius);

      renderMarkers();
    },
    (err)=>{
      show("現在地取得失敗");
    },
    {
      enableHighAccuracy:true,
      timeout:10000,
      maximumAge:0
    }
  );
});

loadSpots();

setTimeout(() => {
  map.invalidateSize();
}, 300);

</script>
</body>
</html>
