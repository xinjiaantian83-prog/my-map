<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body { margin: 0; padding: 0; height: 100%; }
#map { height: 100vh; width: 100%; }

#controls {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 1000;
  background: rgba(255,255,255,0.95);
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 10px;
  font-size: 14px;
  min-width: 210px;
}
#controls .row { display: flex; gap: 6px; flex-wrap: wrap; }
#controls button {
  border: 1px solid #ccc;
  background: #fff;
  border-radius: 10px;
  padding: 8px 10px;
}
#controls button.active {
  border-color: #000;
  font-weight: 700;
}
#status { margin-top: 6px; font-size: 12px; opacity: 0.88; }

.locate-btn {
  width: 44px;
  height: 44px;
  background: #fff;
  border: none;
  border-radius: 12px;
  font-size: 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  cursor: pointer;
}
</style>
</head>

<body>
<div id="controls">
  <div class="row">
    <button data-radius="500" class="active">500m</button>
    <button data-radius="1000">1km</button>
    <button data-radius="3000">3km</button>
    <button data-radius="all">全部</button>
  </div>
  <div id="status">現在地を取得中…</div>
</div>

<div id="map"></div>
