<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わんわんコイン</title>

<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<meta name="theme-color" content="#ffffff">
</head>

<body>
<script>
  const APP_URL = "https://xinjiaantian83-prog.github.io/my-map/";

  // iPhone: ホーム画面から起動された時だけ true
  const isIOSStandalone = window.navigator.standalone === true;

  // Androidなど: インストール状態
  const isStandalone = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches;

  if (isIOSStandalone || isStandalone) {
    location.replace(APP_URL);
  } else {
    // Safariで普通に開いた場合は何もしない（追加作業用ページ）
    document.body.innerHTML = "<p style='font-family:-apple-system; padding:16px;'>共有 → ホーム画面に追加 で登録してね。</p>";
  }
</script>
</body>
</html>
