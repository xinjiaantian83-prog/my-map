<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わんわんコイン</title>

<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<meta name="theme-color" content="#ffffff">

<style>
  body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    display:flex; align-items:center; justify-content:center;
    height:100vh; margin:0;
  }
  .box{ text-align:center; padding:24px; max-width: 320px; }
  .btn{
    display:inline-block; padding:14px 18px;
    border:1px solid #ccc; border-radius:12px;
    text-decoration:none;
  }
</style>
</head>

<body>
  <div class="box" id="guide" style="display:none;">
    <p>ホーム画面に追加してから押すと、すぐ開けます。</p>
    <p style="font-size:14px; opacity:.75;">（Safariの共有 →「ホーム画面に追加」）</p>
    <a class="btn" href="https://xinjiaantian83-prog.github.io/my-map/">わんわんコインを開く</a>
  </div>

<script>
  const APP_URL = "https://xinjiaantian83-prog.github.io/my-map/";

  // iOS: ホーム画面から起動されたか判定
  const isIOSStandalone = window.navigator.standalone === true;

  // その他: PWA/インストール状態判定（Androidなど）
  const isStandalone = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches;

  if (isIOSStandalone || isStandalone) {
    // ホーム画面から起動 → 即アプリへ
    location.replace(APP_URL);
  } else {
    // Safariで普通に開いた → 追加案内だけ表示（毎回この画面にはしない）
    document.getElementById('guide').style.display = 'block';
  }
</script>

</body>
</html>
